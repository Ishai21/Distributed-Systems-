sim {
  seed = 2002
  runDurationSeconds = 45
  algorithmName = "rollback"
  syntheticGraph = true
  nodeCount = 15
  edgeProbability = 0.6
  graphFilePath = ""

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING", "GOSSIP", "WORK"]
    overrides = []
  }

  traffic {
    tickIntervalMs = 150
    defaultPdf = [
      { msg = "WORK", p = 0.50 },
      { msg = "PING", p = 0.30 },
      { msg = "GOSSIP", p = 0.20 }
    ]
    perNodePdf = []
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 150, mode = "pdf" },
      { node = 3, tickEveryMs = 250, mode = "pdf" }
    ]
    inputs = [{ node = 1 }, { node = 2 }]
  }

  rollback {
    checkpointInterval = 5
  }
}
