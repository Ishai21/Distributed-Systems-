sim {
  seed = 3003
  runDurationSeconds = 60
  algorithmName = "both"
  syntheticGraph = true
  nodeCount = 25
  edgeProbability = 0.5
  graphFilePath = ""

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
    overrides = []
  }

  traffic {
    tickIntervalMs = 120
    defaultPdf = [
      { msg = "PING", p = 0.437956 },
      { msg = "GOSSIP", p = 0.218978 },
      { msg = "WORK", p = 0.145985 },
      { msg = "ACK", p = 0.109489 },
      { msg = "CONTROL", p = 0.087592 }
    ]
    perNodePdf = [
      {
        node = 5
        pdf = [
          { msg = "WORK", p = 0.70 },
          { msg = "PING", p = 0.15 },
          { msg = "GOSSIP", p = 0.10 },
          { msg = "ACK", p = 0.05 }
        ]
      }
    ]
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 120, mode = "pdf" },
      { node = 5, tickEveryMs = 180, mode = "pdf" },
      { node = 9, tickEveryMs = 240, mode = "pdf" }
    ]
    inputs = [{ node = 1 }, { node = 2 }, { node = 3 }]
  }

  rollback {
    checkpointInterval = 5
  }
}
