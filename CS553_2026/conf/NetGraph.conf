# NetGameSim-exported topology (DOT). Ring-election / both add a logical ring overlay in GraphLoader so a leader can be elected.
sim {
  seed = 42
  runDurationSeconds = 45
  algorithmName = "both"
  syntheticGraph = false
  nodeCount = 101
  edgeProbability = 0.0
  graphFilePath = "graph/NetGraph_14-04-26-16-41-08.ngs.dot"

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING"]
    overrides = []
  }

  traffic {
    tickIntervalMs = 100
    defaultPdf = [
      { msg = "PING", p = 0.50 },
      { msg = "GOSSIP", p = 0.30 },
      { msg = "WORK", p = 0.20 }
    ]
    perNodePdf = []
  }

  initiators {
    timers = [{ node = 0, tickEveryMs = 100, mode = "pdf" }]
    inputs = [{ node = 1 }]
  }

  rollback {
    checkpointInterval = 5
  }
}
