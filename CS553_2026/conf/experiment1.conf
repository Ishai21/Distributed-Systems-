sim {
  seed = 1001
  runDurationSeconds = 20
  algorithmName = "ring-election"
  syntheticGraph = true
  nodeCount = 8
  edgeProbability = 0.25
  graphFilePath = ""

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING", "GOSSIP"]
    overrides = []
  }

  traffic {
    tickIntervalMs = 200
    defaultPdf = [
      { msg = "PING", p = 0.70 },
      { msg = "GOSSIP", p = 0.30 }
    ]
    perNodePdf = []
  }

  initiators {
    timers = [{ node = 0, tickEveryMs = 200, mode = "pdf" }]
    inputs = []
  }

  rollback {
    checkpointInterval = 5
  }
}
