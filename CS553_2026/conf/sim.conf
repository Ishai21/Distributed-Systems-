sim {
  seed = 42
  runDurationSeconds = 30
  algorithmName = "both"
  syntheticGraph = true
  nodeCount = 10
  edgeProbability = 0.4
  graphFilePath = ""

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING"]
    overrides = []
  }

  traffic {
    tickIntervalMs = 100
    defaultPdf = [
      { msg = "PING", p = 0.50 },
      { msg = "GOSSIP", p = 0.30 },
      { msg = "WORK", p = 0.20 }
    ]
    perNodePdf = []
  }

  initiators {
    timers = [{ node = 0, tickEveryMs = 100, mode = "pdf" }]
    inputs = [{ node = 1 }]
  }

  rollback {
    checkpointInterval = 5
  }
}
